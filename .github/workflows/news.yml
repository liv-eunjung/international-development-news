name: International Development News

on:
  workflow_dispatch:
  schedule:
    # 매일 한국시간 오전 8시
    - cron: "0 23 * * *"

permissions:
  contents: write

jobs:
  collect-news:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 불러오기
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 라이브러리 설치
        run: pip install -r requirements.txt

      - name: 뉴스 수집 및 브리핑 생성
        run: python news.py

      - name: 변경된 파일 저장
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md index.html

          if git diff --cached --quiet; then
            echo "변경사항이 없습니다."
          else
            git commit -m "Update daily development brief"
            git push
          fi
